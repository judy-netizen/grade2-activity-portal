<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Activities</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="student-page">
<header class="topbar">
  <a href="index.html" class="back-btn">← Home</a>
  <div class="topbar-title">🎒 My Activities</div>
  <div id="student-name-label" class="topbar-name"></div>
</header>
<div class="page-wrap">
  <div id="day-picker-screen">
    <div class="welcome-msg" id="welcome-msg"></div>
    <div class="week-sections" id="week-sections"></div>
  </div>
  <div id="activity-screen" class="hidden">
    <div class="activity-nav">
      <button class="back-to-days" onclick="showDayPicker()">← Back to days</button>
      <div class="activity-day-title" id="activity-day-title"></div>
      <button class="retry-btn" onclick="confirmRetry()" title="Retry this activity">🔄 Retry</button>
    </div>
    <div class="subject-tabs" id="subject-tabs">
      <button class="stab active" data-s="english" onclick="showAct('english',this)">📖 English</button>
      <button class="stab" data-s="math" onclick="showAct('math',this)">🔢 Math</button>
      <button class="stab" data-s="filipino" onclick="showAct('filipino',this)">🇵🇭 Filipino</button>
      <button class="stab" data-s="spelling" onclick="showAct('spelling',this)">✏️ Spelling</button>
      <button class="stab sci-tab hidden" data-s="science" id="sci-tab-btn" onclick="showAct('science',this)">🔭 Science</button>
    </div>
    <div id="act-content"></div>
  </div>
</div>
<script src="app.js"></script>
<script src="activities.js"></script>
<script>
var currentDay = null;
var currentSubject = 'english';
var state = {};

document.getElementById('student-name-label').textContent = localStorage.getItem('studentName') || 'Student';

var name = localStorage.getItem('studentName') || 'there';
document.getElementById('welcome-msg').innerHTML =
  '<div class="welcome-hero">Hi, ' + name.split(' ')[0] + '! 👋</div>' +
  '<div class="welcome-sub">Pick a day to start your activity!</div>';

function buildDayPicker() {
  var weeks = ['week1','week2','week3','week4'];
  var stars = ['⭐','⭐⭐','⭐⭐⭐','⭐⭐⭐⭐'];
  var html = '';
  weeks.forEach(function(wk, wi) {
    var wdata = ACTIVITIES[wk];
    html += '<div class="week-block">';
    html += '<div class="week-label">' + wdata.label + ' ' + stars[wi] + '</div>';
    html += '<div class="day-grid">';
    wdata.days.forEach(function(day) {
      var done = localStorage.getItem('day_done_' + day.day);
      var scores = getdayScores(day.day);
      html += '<div class="day-card ' + (done ? 'day-done' : '') + '" onclick="startDay(' + day.day + ',\'' + wk + '\')">';
      html += '<div class="day-num">Day ' + day.day + '</div>';
      html += '<div class="day-title">' + day.title + '</div>';
      html += '<div class="day-focus-tag">' + day.focus + '</div>';
      if (done) html += '<div class="day-check">✓ Done!</div>';
      else if (scores > 0) html += '<div class="day-check in-prog">In progress</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('week-sections').innerHTML = html;
}

function getdayScores(dayNum) {
  return ['english','math','filipino','spelling'].filter(function(s) {
    return localStorage.getItem('day' + dayNum + '_' + s);
  }).length;
}

function startDay(dayNum, weekKey) {
  var wdata = ACTIVITIES[weekKey];
  currentDay = wdata.days.find(function(d) { return d.day === dayNum; });
  currentWeekKey = weekKey;
  state = {};
  document.getElementById('day-picker-screen').classList.add('hidden');
  document.getElementById('activity-screen').classList.remove('hidden');
  document.getElementById('activity-day-title').textContent = 'Day ' + dayNum + ' — ' + currentDay.title;
  // Show science tab only if this day has science
  var sciBtn = document.getElementById('sci-tab-btn');
  if (currentDay.science) { sciBtn.classList.remove('hidden'); }
  else { sciBtn.classList.add('hidden'); }
  showAct('english', document.querySelector('.stab[data-s="english"]'));
}

function showDayPicker() {
  document.getElementById('activity-screen').classList.add('hidden');
  document.getElementById('day-picker-screen').classList.remove('hidden');
  buildDayPicker();
}

function confirmRetry() {
  var subjectNames = {english:'English', math:'Math', filipino:'Filipino', spelling:'Spelling'};
  var subName = subjectNames[currentSubject];
  if (confirm('Retry ' + subName + ' for Day ' + currentDay.day + '? Your current answer will be cleared.')) {
    localStorage.removeItem('day' + currentDay.day + '_' + currentSubject);
    localStorage.removeItem('day_done_' + currentDay.day);
    state = {};
    renderActivity(currentSubject);
  }
}

function showAct(subject, btn) {
  currentSubject = subject;
  document.querySelectorAll('.stab').forEach(function(el) { el.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderActivity(subject);
}

function renderActivity(subject) {
  var data = currentDay[subject];
  var html = '';
  var saved = JSON.parse(localStorage.getItem('day' + currentDay.day + '_' + subject) || 'null');

  if (subject === 'english') {
    if (data.type === 'comprehension') {
      html += '<div class="act-card">';
      html += '<div class="act-header"><span class="tag blue">English</span> Reading & Comprehension</div>';
      html += '<div class="story-box">' + data.story + '</div>';
      html += '<div class="q-section-label">1. Multiple Choice</div>';
      data.questions.forEach(function(q, qi) {
        html += '<div class="q-block" id="eq' + qi + '"><div class="q-text">' + (qi+1) + '. ' + q.q + '</div><div class="opts">';
        q.opts.forEach(function(opt, oi) {
          var cls = saved ? (oi === q.a ? 'opt correct' : (saved.picks && saved.picks[qi] === oi ? 'opt wrong' : 'opt')) : 'opt';
          html += '<div class="' + cls + '" onclick="pickEng(' + qi + ',' + oi + ',this)">' + opt + '</div>';
        });
        html += '</div></div>';
      });
      if (data.fill_blanks) {
        html += '<div class="q-section-label">2. Fill in the blanks</div>';
        data.fill_blanks.forEach(function(fb, fbi) {
          var parts = fb.sentence.split('___');
          html += '<div class="q-block"><div class="q-text" style="line-height:2.2">';
          parts.forEach(function(part, pi) {
            html += part;
            if (pi < fb.words.length) {
              var savedVal = saved && saved.fillBlanks && saved.fillBlanks[fbi] && saved.fillBlanks[fbi][pi];
              var correct = savedVal === fb.words[pi];
              var slotStyle = savedVal ? ('border-color:' + (correct ? '#3B6D11;color:#27500A' : '#A32D2D;color:#791F1F')) : '';
              html += '<span class="fill-slot" style="min-width:100px;' + slotStyle + '">' + (savedVal || '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;') + '</span>';
            }
          });
          html += '</div>';
          html += '<div style="font-size:12px;color:var(--muted);margin-top:4px">Word bank: <strong>' + fb.words.join(', ') + '</strong></div>';
          if (saved && saved.fillBlanks) {
            var allCorrect = fb.words.every(function(w, wi) { return saved.fillBlanks[fbi] && saved.fillBlanks[fbi][wi] === w; });
            html += '<div style="font-size:12px;margin-top:4px;font-weight:500;color:' + (allCorrect ? '#3B6D11' : '#A32D2D') + '">' + (allCorrect ? '✓ Correct!' : 'Answer: ' + fb.words.join(', ')) + '</div>';
          }
          html += '</div>';
        });
        html += '<div class="q-section-label">3. How would you solve the baker\'s problem?</div>';
        html += '<div class="q-block"><textarea class="text-area-input" id="open-answer" placeholder="Write your answer here..." rows="3">' + (saved && saved.openAnswer ? saved.openAnswer : '') + '</textarea></div>';
      }
      if (data.open_questions) {
        html += '<div class="q-section-label">Open Questions — Write your answer</div>';
        data.open_questions.forEach(function(oq, oi) {
          var savedVal = saved && saved.openAnswers ? (saved.openAnswers[oi] || '') : '';
          html += '<div class="q-block"><div class="q-text">' + (oi+1) + '. ' + oq.q + '</div>';
          html += '<textarea class="text-area-input" id="oq' + oi + '" placeholder="Write your answer here..." rows="3">' + savedVal + '</textarea></div>';
        });
      }
      html += '<button class="submit-btn" onclick="submitEng()">Submit English ✓</button>';
      if (saved) html += '<div class="feedback-box show ' + (saved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + saved.msg + '</div>';
      else html += '<div class="feedback-box" id="eng-fb"></div>';
      html += '</div>';
    } else {
      html += '<div class="act-card">';
      html += '<div class="act-header"><span class="tag blue">English</span> Fill in the Blank</div>';
      html += '<div class="word-bank">';
      data.sentence_set.forEach(function(s) {
        html += '<span class="word-chip" id="wc-' + s.word + '" onclick="selectFillWord(\'' + s.word + '\')">' + s.word + '</span>';
      });
      html += '</div><div class="fill-sentences">';
      data.sentence_set.forEach(function(s, si) {
        var parts = s.sentence.split('___');
        var filled = saved && saved.fills && saved.fills[si];
        var slotStyle = filled ? 'border-color:#185FA5;color:#0C447C' : '';
        html += '<p>' + parts[0] + '<span class="fill-slot" id="fs' + si + '" style="' + slotStyle + '" onclick="fillEngSlot(' + si + ')">' + (filled || '') + '</span>' + (parts[1] || '') + '</p>';
      });
      html += '</div>';
      html += '<button class="submit-btn" onclick="submitFill()">Check answers ✓</button>';
      if (saved) html += '<div class="feedback-box show ' + (saved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + saved.msg + '</div>';
      else html += '<div class="feedback-box" id="fill-fb"></div>';
      html += '</div>';
    }
  }

  if (subject === 'math') {
    html += '<div class="act-card">';
    if (data.type === 'telling_time') {
      html += '<div class="act-header"><span class="tag green">Math</span> Telling Time — Whole Hours</div>';
      html += '<p class="act-instruction">' + data.instruction + '</p>';
      html += '<div class="clock-grid">';
      data.clocks.forEach(function(c, ci) {
        var val = saved && saved.answers ? (saved.answers[ci] || '') : '';
        var correct = val === c.answer;
        var inp_cls = saved ? (correct ? 'text-input correct-inp' : 'text-input wrong-inp') : 'text-input';
        html += '<div class="clock-card">';
        html += '<div class="clock-num">Clock ' + c.num + '</div>';
        html += '<div class="clock-face" id="cf' + ci + '"></div>';
        html += '<div class="clock-hint">' + c.hint + '</div>';
        html += '<input class="' + inp_cls + '" id="tc' + ci + '" value="' + val + '" placeholder="__:00" autocomplete="off" style="text-align:center;max-width:90px">';
        if (saved && !correct) html += '<div style="font-size:11px;color:#A32D2D;margin-top:3px">Answer: ' + c.answer + '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '<button class="submit-btn" onclick="submitMath()">Check answers ✓</button>';
      if (saved) html += '<div class="feedback-box show ' + (saved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + saved.msg + '</div>';
      else html += '<div class="feedback-box" id="math-fb"></div>';
    } else {
      html += '<div class="act-header"><span class="tag green">Math</span> Word Problems</div>';
      if (data.context) html += '<div class="story-box" style="margin-bottom:16px">' + data.context + '</div>';
      data.problems.forEach(function(p, pi) {
        var val = saved && saved.answers ? saved.answers[pi] : '';
        var inp_cls = saved ? (parseInt(val) === p.a ? 'num-input correct-inp' : 'num-input wrong-inp') : 'num-input';
        html += '<div class="q-block"><div class="q-text">' + p.q + '</div>';
        html += '<input class="' + inp_cls + '" type="number" id="mq' + pi + '" value="' + val + '" placeholder="?" min="0">';
        if (saved && parseInt(val) !== p.a) html += '<div style="font-size:12px;color:#A32D2D;margin-top:4px">Answer: ' + p.a + '</div>';
        html += '</div>';
      });
      html += '<button class="submit-btn" onclick="submitMath()">Submit Math ✓</button>';
      if (saved) html += '<div class="feedback-box show ' + (saved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + saved.msg + '</div>';
      else html += '<div class="feedback-box" id="math-fb"></div>';
    }
    html += '</div>';
  }

  if (subject === 'filipino') {
    html += '<div class="act-card">';
    if (data.type === 'comprehension') {
      html += '<div class="act-header"><span class="tag pink">Filipino</span> Magbasa at Sagutin</div>';
      html += '<div class="fil-story-box">' + data.story + '</div>';
      if (data.instruction) html += '<p class="act-instruction" style="margin-bottom:14px">' + data.instruction + '</p>';
      data.questions.forEach(function(q, qi) {
        html += '<div class="q-block" id="fq' + qi + '"><div class="q-text">' + q.q + '</div><div class="opts">';
        q.opts.forEach(function(opt, oi) {
          var cls = saved ? (oi === q.a ? 'opt correct' : (saved.picks && saved.picks[qi] === oi ? 'opt wrong' : 'opt')) : 'opt';
          html += '<div class="' + cls + '" onclick="pickFil(' + qi + ',' + oi + ',this)">' + opt + '</div>';
        });
        html += '</div></div>';
      });
    } else if (data.type === 'matching') {
      html += '<div class="act-header"><span class="tag pink">Filipino</span> Itambal (Matching)</div>';
      html += '<p class="act-instruction">Piliin ang tamang Filipino na salita para sa bawat larawan.</p>';
      var shuffled = data.pairs.slice().sort(function() { return Math.random() - 0.5; });
      html += '<div class="match-grid">';
      html += '<div class="match-col">';
      data.pairs.forEach(function(p, pi) {
        html += '<div class="match-item emoji-item" id="mei' + pi + '" onclick="selectMatchEmoji(' + pi + ')">' + p.emoji + ' ' + p.english + '</div>';
      });
      html += '</div><div class="match-col">';
      shuffled.forEach(function(p, pi) {
        var correctIdx = data.pairs.findIndex(function(x) { return x.filipino === p.filipino; });
        html += '<div class="match-item fil-item" id="mfi' + pi + '" data-fil="' + p.filipino + '" data-correct="' + correctIdx + '" onclick="selectMatchFil(this,' + pi + ')">' + p.filipino + '</div>';
      });
      html += '</div></div>';
    } else {
      html += '<div class="act-header"><span class="tag pink">Filipino</span> Pumili ng Tamang Sagot</div>';
      data.questions.forEach(function(q, qi) {
        html += '<div class="q-block" id="fq' + qi + '"><div class="q-text">' + (qi+1) + '. ' + q.q + '</div><div class="opts">';
        q.opts.forEach(function(opt, oi) {
          var cls = saved ? (oi === q.a ? 'opt correct' : (saved.picks && saved.picks[qi] === oi ? 'opt wrong' : 'opt')) : 'opt';
          html += '<div class="' + cls + '" onclick="pickFil(' + qi + ',' + oi + ',this)">' + opt + '</div>';
        });
        html += '</div></div>';
      });
    }
    html += '<button class="submit-btn" onclick="submitFil()">Suriin ang sagot ✓</button>';
    if (saved) html += '<div class="feedback-box show ' + (saved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + saved.msg + '</div>';
    else html += '<div class="feedback-box" id="fil-fb"></div>';
    html += '</div>';
  }

  if (subject === 'spelling') {
    html += '<div class="act-card">';
    if (data.type === 'vowel_fill') {
      html += '<div class="act-header"><span class="tag amber">Spelling</span> Beginning Spelling</div>';
      html += '<p class="act-instruction">' + data.instruction + '</p>';
      html += '<div class="vowel-grid">';
      data.words.forEach(function(w, wi) {
        var savedAns = saved && saved.answers ? saved.answers[wi] : null;
        var correct = savedAns === w.missing;
        html += '<div class="vowel-card" id="vc' + wi + '">';
        html += '<div class="vowel-clue">' + w.clue + '</div>';
        html += '<div class="vowel-word">' + w.display + '</div>';
        html += '<div class="vowel-opts">';
        w.opts.forEach(function(v) {
          var btnCls = 'vowel-btn';
          if (savedAns) { btnCls += v === w.missing ? ' v-correct' : (v === savedAns ? ' v-wrong' : ' v-dim'); }
          html += '<button class="' + btnCls + '" onclick="pickVowel(' + wi + ',\'' + v + '\')">' + v + '</button>';
        });
        html += '</div>';
        if (savedAns) html += '<div class="vowel-result ' + (correct ? 'vr-good' : 'vr-bad') + '">' + (correct ? '✓ ' + w.answer : '✗ ' + w.answer) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else if (data.type === 'jumbled') {
      html += '<div class="act-header"><span class="tag amber">Spelling</span> Jumbled Words</div>';
      html += '<p class="act-instruction">' + data.instruction + '</p>';
      html += '<div class="word-bank-box">📚 Word Bank: <strong>' + data.word_bank.join(', ') + '</strong></div>';
      html += '<div class="jumble-grid">';
      data.words.forEach(function(w, wi) {
        var val = saved && saved.answers ? (saved.answers[wi] || '') : '';
        var correct = val.toUpperCase() === w.answer;
        var inp_cls = saved ? (correct ? 'text-input correct-inp' : 'text-input wrong-inp') : 'text-input';
        html += '<div class="jumble-row">';
        html += '<div class="jumble-scrambled">' + w.jumbled + '</div>';
        html += '<div class="jumble-arrow">→</div>';
        html += '<input class="' + inp_cls + ' upper" id="jw' + wi + '" value="' + val + '" placeholder="Unscramble..." autocomplete="off">';
        if (saved && !correct) html += '<div style="font-size:11px;color:#A32D2D;margin-top:3px">Answer: ' + w.answer + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="act-header"><span class="tag amber">Spelling</span> Spell the Word</div>';
      html += '<p class="act-instruction">Look at the clue and type the correct spelling.</p>';
      data.words.forEach(function(w, wi) {
        var val = saved && saved.answers ? saved.answers[wi] : '';
        var inp_cls = saved ? (val.toLowerCase() === w.answer ? 'text-input correct-inp' : 'text-input wrong-inp') : 'text-input';
        html += '<div class="q-block"><div class="q-text">' + w.clue + ' ' + w.hint + '</div>';
        html += '<input class="' + inp_cls + '" id="sw' + wi + '" value="' + val + '" placeholder="Type here..." autocomplete="off">';
        if (saved && val.toLowerCase() !== w.answer) html += '<div style="font-size:12px;color:#A32D2D;margin-top:4px">Answer: ' + w.answer + '</div>';
        html += '</div>';
      });
    }
    html += '<button class="submit-btn" onclick="submitSpell()">Check spelling ✓</button>';
    if (saved) html += '<div class="feedback-box show ' + (saved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + saved.msg + '</div>';
    else html += '<div class="feedback-box" id="spell-fb"></div>';
    html += '</div>';
  }

  if (subject === 'science' && currentDay.science) {
    var sci = currentDay.science;
    var sciSaved = JSON.parse(localStorage.getItem('day' + currentDay.day + '_science') || 'null');
    html += '<div class="act-card">';
    html += '<div class="act-header"><span class="tag sci-tag">🔭 Science</span> Planet Facts — Matching</div>';
    html += '<p class="act-instruction">' + sci.instruction + '</p>';
    html += '<div class="sci-match-area">';
    // Planets column
    html += '<div class="sci-col"><div class="sci-col-label">🪐 Planets</div>';
    sci.pairs.forEach(function(p, pi) {
      var matched = sciSaved && sciSaved.pairs && sciSaved.pairs[pi];
      var correct = matched === p.description;
      var cls = 'sci-planet-btn' + (matched ? (correct ? ' sci-correct' : ' sci-wrong') : '');
      html += '<div class="' + cls + '" id="spi' + pi + '" onclick="selectSciPlanet(' + pi + ')">' + p.planet + (matched ? '<div class="sci-match-result">' + (correct ? '✓' : '✗') + ' ' + matched + '</div>' : '') + '</div>';
    });
    html += '</div>';
    // Descriptions column (shuffled display)
    var shuffled = sci.pairs.slice().sort(function() { return Math.random() - 0.5; });
    state.shuffledDescs = shuffled;
    html += '<div class="sci-col"><div class="sci-col-label">📋 Descriptions</div>';
    shuffled.forEach(function(p, si) {
      html += '<div class="sci-desc-btn" id="sdi' + si + '" onclick="selectSciDesc(' + si + ')">' + p.description + '</div>';
    });
    html += '</div></div>';
    html += '<button class="submit-btn" onclick="submitScience()">Check answers ✓</button>';
    if (sciSaved) html += '<div class="feedback-box show ' + (sciSaved.pct >= 60 ? 'fb-good' : 'fb-low') + '">' + sciSaved.msg + '</div>';
    else html += '<div class="feedback-box" id="sci-fb"></div>';
    html += '</div>';
  }

  document.getElementById('act-content').innerHTML = html;
  state.engPicks = {}; state.fillSlots = {}; state.fillActive = null;
  state.filPicks = {}; state.matchSel = null; state.matchPairs = {};
  state.sciSelPlanet = null; state.sciPairs = {};
}

function pickEng(qi, oi, el) {
  if (!state.engPicks) state.engPicks = {};
  state.engPicks[qi] = oi;
  var opts = el.parentElement.querySelectorAll('.opt');
  opts.forEach(function(o) { o.className = 'opt'; });
  el.classList.add('selected-opt');
}

function submitEng() {
  var data = currentDay.english;
  var sc = 0;
  data.questions.forEach(function(q, qi) {
    var picked = state.engPicks[qi];
    var opts = document.getElementById('eq' + qi).querySelectorAll('.opt');
    opts.forEach(function(o) { o.className = 'opt'; });
    if (picked !== undefined) {
      if (picked === q.a) { opts[picked].classList.add('correct'); sc++; }
      else { opts[picked].classList.add('wrong'); opts[q.a].classList.add('correct'); }
    } else { opts[q.a].classList.add('correct'); }
  });
  var fillBlanks = null;
  if (data.fill_blanks) {
    fillBlanks = {};
    data.fill_blanks.forEach(function(fb, fbi) { fillBlanks[fbi] = fb.words; });
  }
  var openAnswer = document.getElementById('open-answer') ? document.getElementById('open-answer').value : '';
  var openAnswers = {};
  if (data.open_questions) {
    data.open_questions.forEach(function(oq, oi) {
      var el = document.getElementById('oq' + oi);
      if (el) openAnswers[oi] = el.value;
    });
  }
  var msg = makeFeedback(sc, data.questions.length);
  var pct = Math.round(sc / data.questions.length * 100);
  showFB('eng-fb', msg, pct);
  saveActivityScore('english', sc, data.questions.length, msg, pct, {picks: state.engPicks, fillBlanks: fillBlanks, openAnswer: openAnswer, openAnswers: openAnswers});
}

function selectFillWord(word) {
  document.querySelectorAll('.word-chip').forEach(function(c) { c.classList.remove('selected'); });
  var chip = document.getElementById('wc-' + word);
  if (chip && !chip.classList.contains('used')) { chip.classList.add('selected'); state.fillActive = word; }
}

function fillEngSlot(si) {
  var slot = document.getElementById('fs' + si);
  if (!state.fillSlots) state.fillSlots = {};
  if (slot.textContent) {
    var prev = slot.textContent;
    var prevChip = document.getElementById('wc-' + prev);
    if (prevChip) { prevChip.classList.remove('used','selected'); }
    slot.textContent = ''; slot.style.borderColor = ''; slot.style.color = '';
    delete state.fillSlots[si];
  } else if (state.fillActive) {
    slot.textContent = state.fillActive; slot.style.borderColor = '#185FA5'; slot.style.color = '#0C447C';
    var chip = document.getElementById('wc-' + state.fillActive);
    if (chip) { chip.classList.add('used'); chip.classList.remove('selected'); }
    state.fillSlots[si] = state.fillActive; state.fillActive = null;
  }
}

function submitFill() {
  var data = currentDay.english;
  var sc = 0;
  data.sentence_set.forEach(function(s, si) {
    var slot = document.getElementById('fs' + si);
    if (state.fillSlots[si] === s.word) { sc++; slot.style.borderColor = '#3B6D11'; slot.style.color = '#27500A'; }
    else { slot.style.borderColor = '#A32D2D'; slot.style.color = '#791F1F'; }
  });
  var msg = makeFeedback(sc, data.sentence_set.length);
  var pct = Math.round(sc / data.sentence_set.length * 100);
  showFB('fill-fb', msg, pct);
  saveActivityScore('english', sc, data.sentence_set.length, msg, pct, {fills: state.fillSlots});
}

function submitMath() {
  var data = currentDay.math;
  var sc = 0; var answers = {};
  if (data.type === 'telling_time') {
    data.clocks.forEach(function(c, ci) {
      var inp = document.getElementById('tc' + ci);
      var val = inp ? inp.value.trim() : '';
      answers[ci] = val;
      if (val === c.answer) { sc++; if(inp) inp.classList.add('correct-inp'); }
      else { if(inp) inp.classList.add('wrong-inp'); }
    });
    var msg = makeFeedback(sc, data.clocks.length);
    var pct = Math.round(sc / data.clocks.length * 100);
    showFB('math-fb', msg, pct);
    saveActivityScore('math', sc, data.clocks.length, msg, pct, {answers: answers});
  } else {
    data.problems.forEach(function(p, pi) {
      var inp = document.getElementById('mq' + pi);
      var val = parseInt(inp.value);
      answers[pi] = val;
      if (val === p.a) { sc++; inp.classList.add('correct-inp'); inp.classList.remove('wrong-inp'); }
      else { inp.classList.add('wrong-inp'); inp.classList.remove('correct-inp'); }
    });
    var msg = makeFeedback(sc, data.problems.length);
    var pct = Math.round(sc / data.problems.length * 100);
    showFB('math-fb', msg, pct);
    saveActivityScore('math', sc, data.problems.length, msg, pct, {answers: answers});
  }
}

function pickFil(qi, oi, el) {
  if (!state.filPicks) state.filPicks = {};
  state.filPicks[qi] = oi;
  var opts = el.parentElement.querySelectorAll('.opt');
  opts.forEach(function(o) { o.className = 'opt'; });
  el.classList.add('selected-opt');
}

var matchSelEmoji = null;
function selectMatchEmoji(idx) {
  document.querySelectorAll('.emoji-item').forEach(function(el) { el.classList.remove('selected'); });
  document.getElementById('mei' + idx).classList.add('selected');
  matchSelEmoji = idx;
}
function selectMatchFil(el, idx) {
  if (matchSelEmoji === null) return;
  if (!state.matchPairs) state.matchPairs = {};
  state.matchPairs[matchSelEmoji] = el.dataset.fil;
  document.querySelectorAll('.emoji-item').forEach(function(e) { e.classList.remove('selected'); });
  document.getElementById('mei' + matchSelEmoji).textContent += ' → ' + el.dataset.fil;
  el.style.opacity = '0.5'; el.style.pointerEvents = 'none';
  matchSelEmoji = null;
}

function submitFil() {
  var data = currentDay.filipino;
  var sc = 0; var total = 0;
  if (data.type === 'matching') {
    total = data.pairs.length;
    data.pairs.forEach(function(p, pi) {
      if (state.matchPairs && state.matchPairs[pi] === p.filipino) sc++;
    });
  } else {
    total = data.questions.length;
    data.questions.forEach(function(q, qi) {
      var picked = state.filPicks[qi];
      var qel = document.getElementById('fq' + qi);
      var opts = qel ? qel.querySelectorAll('.opt') : [];
      opts.forEach(function(o) { o.className = 'opt'; });
      if (picked !== undefined) {
        if (picked === q.a) { if (opts[picked]) opts[picked].classList.add('correct'); sc++; }
        else { if (opts[picked]) opts[picked].classList.add('wrong'); if (opts[q.a]) opts[q.a].classList.add('correct'); }
      } else { if (opts[q.a]) opts[q.a].classList.add('correct'); }
    });
  }
  var msg = makeFeedback(sc, total);
  var pct = Math.round(sc / total * 100);
  showFB('fil-fb', msg, pct);
  saveActivityScore('filipino', sc, total, msg, pct, {picks: state.filPicks || state.matchPairs});
}

function pickVowel(wi, vowel) {
  if (!state.vowelPicks) state.vowelPicks = {};
  state.vowelPicks[wi] = vowel;
  var card = document.getElementById('vc' + wi);
  card.querySelectorAll('.vowel-btn').forEach(function(b) { b.classList.remove('v-selected'); });
  var btns = card.querySelectorAll('.vowel-btn');
  btns.forEach(function(b) { if (b.textContent === vowel) b.classList.add('v-selected'); });
}

function submitSpell() {
  var data = currentDay.spelling;
  var sc = 0; var answers = {};
  if (data.type === 'vowel_fill') {
    data.words.forEach(function(w, wi) {
      var picked = state.vowelPicks && state.vowelPicks[wi];
      answers[wi] = picked || '';
      if (picked === w.missing) sc++;
    });
    var msg = makeFeedback(sc, data.words.length);
    var pct = Math.round(sc / data.words.length * 100);
    showFB('spell-fb', msg, pct);
    saveActivityScore('spelling', sc, data.words.length, msg, pct, {answers: answers});
    renderActivity('spelling');
  } else if (data.type === 'jumbled') {
    data.words.forEach(function(w, wi) {
      var inp = document.getElementById('jw' + wi);
      var val = inp ? inp.value.trim().toUpperCase() : '';
      answers[wi] = val;
      if (val === w.answer) { sc++; if(inp) inp.classList.add('correct-inp'); }
      else { if(inp) inp.classList.add('wrong-inp'); }
    });
    var msg = makeFeedback(sc, data.words.length);
    var pct = Math.round(sc / data.words.length * 100);
    showFB('spell-fb', msg, pct);
    saveActivityScore('spelling', sc, data.words.length, msg, pct, {answers: answers});
  } else {
    data.words.forEach(function(w, wi) {
      var inp = document.getElementById('sw' + wi);
      var val = inp.value.trim().toLowerCase();
      answers[wi] = val;
      if (val === w.answer) { sc++; inp.classList.add('correct-inp'); inp.classList.remove('wrong-inp'); }
      else { inp.classList.add('wrong-inp'); inp.classList.remove('correct-inp'); }
    });
    var msg = makeFeedback(sc, data.words.length);
    var pct = Math.round(sc / data.words.length * 100);
    showFB('spell-fb', msg, pct);
    saveActivityScore('spelling', sc, data.words.length, msg, pct, {answers: answers});
  }
}

function selectSciPlanet(pi) {
  document.querySelectorAll('.sci-planet-btn').forEach(function(el) { el.classList.remove('sci-selected'); });
  document.getElementById('spi' + pi).classList.add('sci-selected');
  state.sciSelPlanet = pi;
}

function selectSciDesc(si) {
  if (state.sciSelPlanet === null) return;
  if (!state.sciPairs) state.sciPairs = {};
  var desc = state.shuffledDescs[si].description;
  state.sciPairs[state.sciSelPlanet] = desc;
  document.querySelectorAll('.sci-planet-btn').forEach(function(e) { e.classList.remove('sci-selected'); });
  var planetEl = document.getElementById('spi' + state.sciSelPlanet);
  if (planetEl) { planetEl.style.borderColor = '#185FA5'; planetEl.style.background = '#E6F1FB'; }
  var descEl = document.getElementById('sdi' + si);
  if (descEl) { descEl.style.opacity = '0.4'; descEl.style.pointerEvents = 'none'; }
  state.sciSelPlanet = null;
}

function submitScience() {
  var sci = currentDay.science;
  var sc = 0;
  sci.pairs.forEach(function(p, pi) {
    var matched = state.sciPairs && state.sciPairs[pi];
    if (matched === p.description) sc++;
  });
  var msg = makeFeedback(sc, sci.pairs.length);
  var pct = Math.round(sc / sci.pairs.length * 100);
  showFB('sci-fb', msg, pct);
  // Save science score separately
  var now = new Date();
  var timeStr = now.toLocaleDateString('en-PH', {month:'short',day:'numeric'}) + ' ' + now.toLocaleTimeString('en-PH', {hour:'2-digit',minute:'2-digit'});
  localStorage.setItem('day' + currentDay.day + '_science', JSON.stringify({score:sc, max:sci.pairs.length, msg:msg, pct:pct, pairs:state.sciPairs}));
  localStorage.setItem('lastActivity', timeStr);
  var history = JSON.parse(localStorage.getItem('activityHistory') || '[]');
  history.push({subject:'Science', score:sc, max:sci.pairs.length, time:timeStr, day:currentDay.day, title:currentDay.title});
  localStorage.setItem('activityHistory', JSON.stringify(history));
}

function makeFeedback(sc, total) {
  var pct = Math.round(sc / total * 100);
  if (pct === 100) return '🌟 Perfect score! Amazing work!';
  if (pct >= 75) return '😊 Great job! ' + sc + '/' + total + ' correct!';
  if (pct >= 50) return '👍 Good effort! ' + sc + '/' + total + ' correct. Keep going!';
  return '💪 ' + sc + '/' + total + ' correct. Try again — you can do it!';
}

function showFB(id, msg, pct) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'feedback-box show ' + (pct >= 50 ? 'fb-good' : 'fb-low');
}

function saveActivityScore(subject, sc, total, msg, pct, extra) {
  var key = 'day' + currentDay.day + '_' + subject;
  var data = Object.assign({score: sc, max: total, msg: msg, pct: pct, day: currentDay.day, dayTitle: currentDay.title}, extra);
  localStorage.setItem(key, JSON.stringify(data));
  var now = new Date();
  var timeStr = now.toLocaleDateString('en-PH', {month:'short',day:'numeric'}) + ' ' + now.toLocaleTimeString('en-PH', {hour:'2-digit',minute:'2-digit'});
  localStorage.setItem('lastActivity', timeStr);
  var history = JSON.parse(localStorage.getItem('activityHistory') || '[]');
  history.push({subject: subject.charAt(0).toUpperCase()+subject.slice(1), score: sc, max: total, time: timeStr, day: currentDay.day, title: currentDay.title});
  if (history.length > 60) history = history.slice(-60);
  localStorage.setItem('activityHistory', JSON.stringify(history));
  var allDone = ['english','math','filipino','spelling'].every(function(s) {
    return localStorage.getItem('day' + currentDay.day + '_' + s);
  });
  if (allDone) localStorage.setItem('day_done_' + currentDay.day, '1');
}

buildDayPicker();
</script>
